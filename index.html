<style>
    :root{--bg:#040504;--line2:#35543a;--text:#f5faf5;--muted:#c8d3c8;--green:#8bff9e;--shadow:rgba(0,0,0,.52)}

    .nameplate,.panel,.footer-strip{border:1px solid var(--line2);border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0)),linear-gradient(180deg,#0d130d 0%,#060806 100%);box-shadow:0 10px 26px var(--shadow),inset 0 1px 0 rgba(255,255,255,.04),inset 0 0 0 1px rgba(123,255,154,.03),inset 0 -18px 24px rgba(0,0,0,.24);overflow:hidden;min-width:0;min-height:0}

    .nameplate::before,.nameplate::after{content:"";position:absolute;top:12px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #eef4ee 0%, #748374 28%, #232923 62%, #050505 100%);box-shadow:0 0 0 1px #1f261f, inset 0 0 4px rgba(255,255,255,.15)}
    .nameplate::before{left:14px}.nameplate::after{right:14px}
    .name{letter-spacing:.2em;font-size:clamp(28px,4.1vw,42px);font-weight:900;color:#f8fff8;text-shadow:0 0 10px rgba(255,255,255,.08)}
    .subtitle{letter-spacing:.28em;font-size:clamp(11px,1.45vw,16px);text-transform:uppercase;color:#f1fff2;opacity:.96}
    .panel{padding:11px}.panel-header,.matrix-head{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:38px}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:999px;border:1px solid var(--line2);background:linear-gradient(180deg,#111711,#090b09);color:#f8fff8;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.22em;box-shadow:0 0 0 1px rgba(255,255,255,.015), inset 0 1px 0 rgba(255,255,255,.04);white-space:nowrap}
    .row-controls{display:flex;align-items:center;gap:8px;min-width:0}
    .mini-btn,.btn,.toggle,.slot-btn,.display,.rec-tall{border:1px solid var(--line2);border-radius:12px;color:var(--text);background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0)),linear-gradient(180deg,#121912,#090b09);box-shadow:0 4px 12px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.035)}
    .mini-btn,.btn,.toggle,.slot-btn,.rec-tall{cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
    .mini-btn,.btn,.toggle,.slot-btn{min-height:44px;padding:8px 12px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
    .mini-btn.active,.btn.active,.toggle.active,.slot-btn.active,.rec-tall.active{border-color:#6af489;box-shadow:0 0 0 1px rgba(124,255,154,.34),0 0 14px rgba(73,216,110,.18),inset 0 1px 0 rgba(255,255,255,.06)}
    .btn.big{min-height:58px;font-size:15px;letter-spacing:.12em}
    .display{min-height:44px;padding:9px 12px;display:flex;align-items:center;justify-content:center;background:#030503;color:var(--green);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;letter-spacing:.12em;text-shadow:0 0 10px rgba(124,255,154,.2);box-shadow:inset 0 0 12px rgba(73,216,110,.12), inset 0 0 2px rgba(124,255,154,.18), 0 1px 8px rgba(0,0,0,.3);white-space:nowrap}
    .transport-display{min-width:86px}.track-display{min-width:130px}
    .matrix-panel{display:grid;grid-template-rows:auto minmax(0,1fr);gap:9px}.matrix-wrap{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:6px;overflow:hidden}
    .step-header,.track-row{display:grid;grid-template-columns:84px repeat(16,minmax(0,1fr));gap:4px;align-items:center}.step-label{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;text-align:center}
    .step-head{min-height:24px;display:flex;align-items:center;justify-content:center;color:#eef7ee;font-size:11px;font-weight:800;letter-spacing:.08em;border-radius:7px}.block-end{position:relative;margin-right:10px}.block-end::after{content:"";position:absolute;top:-8px;right:-6px;bottom:-8px;width:1px;background:linear-gradient(180deg, transparent, rgba(124,255,154,.75) 18%, rgba(124,255,154,.22) 50%, rgba(124,255,154,.75) 82%, transparent);opacity:.95;pointer-events:none}
    .tracks{min-height:0;display:grid;grid-template-rows:repeat(9,minmax(0,1fr));gap:4px}.track-label{width:100%;min-height:36px;padding:0 8px;border-radius:12px;border:1px solid var(--line2);background:linear-gradient(180deg,#111711,#090b09);box-shadow:0 3px 8px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.03);display:flex;align-items:center;justify-content:flex-start;color:#f6fbf6;font-size:11px;font-weight:800;letter-spacing:.08em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}.track-label.selected{border-color:#6af489;box-shadow:0 0 0 1px rgba(124,255,154,.32), 0 0 14px rgba(73,216,110,.16), inset 0 1px 0 rgba(255,255,255,.05)}
    .step-btn{min-height:36px;border-radius:11px;border:1px solid #243224;background:linear-gradient(180deg,#101610,#050705);box-shadow:inset 0 1px 0 rgba(255,255,255,.025), inset 0 -6px 10px rgba(0,0,0,.22);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:manipulation}.step-btn.on{color:#02230b;background:radial-gradient(circle at 50% 35%, #effff2 0%, #9dffb1 28%, #4fe06f 56%, #11361b 100%);box-shadow:0 0 0 1px rgba(124,255,154,.4), 0 0 16px rgba(73,216,110,.28), inset 0 1px 0 rgba(255,255,255,.24)}.step-btn.playing{outline:2px solid rgba(250,255,250,.92);outline-offset:-2px}
    .controls{min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:10px}.global-panel,.track-panel{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px}.global-body{min-height:0;display:grid;grid-template-columns:106px minmax(0,1fr) 118px;gap:8px}.stack-col,.action-col,.field-col{min-height:0;display:grid;gap:8px;align-content:start}
    .stack-card,.fader-bank,.track-card,.sample-zone,.footer-strip{border:1px solid #213021;border-radius:15px;background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,0)),linear-gradient(180deg,#0c110c,#080a08);box-shadow:inset 0 1px 0 rgba(255,255,255,.025), inset 0 -10px 16px rgba(0,0,0,.16);min-width:0;min-height:0}.stack-card{padding:9px;display:grid;gap:8px}
    .field-row{display:grid;gap:7px;align-content:start}.fader-label,.small-label{font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:#f4faf4;text-align:center;line-height:1.2}.small-label.left{text-align:left}
    select,input[type="number"]{width:100%;min-height:44px;padding:0 10px;border-radius:12px;border:1px solid #314331;background:#040604;color:#f7fff7;outline:none;box-shadow:inset 0 0 10px rgba(0,0,0,.26);font-size:15px;font-weight:700}
    input[type="range"]{appearance:none;-webkit-appearance:none;background:transparent;margin:0} input[type=range]::-webkit-slider-runnable-track{height:9px;border-radius:999px;border:1px solid #314331;background:linear-gradient(180deg,#162016,#090c09);box-shadow:inset 0 1px 3px rgba(0,0,0,.4)} input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;margin-top:-10px;border-radius:50%;border:1px solid rgba(228,255,232,.55);background:radial-gradient(circle at 35% 35%, #f3fff4 0%, #94ffae 34%, #4fdf70 64%, #1e6a34 100%);box-shadow:0 0 0 1px rgba(124,255,154,.26), 0 0 16px rgba(73,216,110,.28)}
    .v-range{width:32px;height:208px;-webkit-appearance:slider-vertical;writing-mode:bt-lr}.v-range::-webkit-slider-runnable-track{width:10px;height:100%}.v-range::-webkit-slider-thumb{margin-top:0;margin-left:-9px}
    .fader-bank{padding:10px 8px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;justify-items:center;align-content:start}.fader-bank.track-bank{grid-template-columns:repeat(8,minmax(0,1fr));gap:4px;padding:10px 6px 8px}.fader{display:grid;justify-items:center;align-content:start;gap:8px;min-width:0}.action-col .btn,.action-col .toggle,.stack-col .btn,.stack-col .toggle{width:100%}
    .track-body{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:8px}.track-card{padding:10px}.pan-card{display:grid;gap:8px}.pan-top{display:grid;grid-template-columns:26px minmax(0,1fr) 54px 26px;gap:8px;align-items:center;color:#f0faf0;font-weight:800;letter-spacing:.12em}.pan-top .small-label{font-size:12px}.pan-title{font-size:13px;font-weight:900;letter-spacing:.2em;text-align:center;text-transform:uppercase}
    .track-footer{display:grid;grid-template-columns:minmax(0,1fr) 120px;gap:8px;align-items:stretch}.start-card{display:grid;gap:8px}.start-inline{display:grid;grid-template-columns:minmax(0,1fr) 64px;gap:8px;align-items:center}
    #trackTempoNum,#panDisp{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    .footer-strip{padding:10px;display:grid;grid-template-columns:minmax(0,1.9fr) 112px minmax(0,1.18fr);gap:10px;align-items:stretch}.sample-zone{padding:8px;display:grid;grid-template-rows:minmax(0,1fr) auto;gap:8px}.sample-grid{min-height:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.slot-btn{font-size:14px;letter-spacing:.08em}.tiny{font-size:11px;color:var(--muted);letter-spacing:.04em;min-height:14px;text-align:left;padding:0 2px}.rec-tall{min-height:100%;padding:10px 12px;font-size:16px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;line-height:1.35}.perf-grid{min-height:0;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;align-content:stretch}.perf-grid .btn{min-height:58px;font-size:14px}
    @media (max-height:1050px){.app{grid-template-rows:minmax(68px,76px) minmax(310px,44.5dvh) minmax(270px,31dvh) minmax(126px,16dvh)} .v-range{height:184px} .step-header,.track-row{grid-template-columns:76px repeat(16,minmax(0,1fr))} .track-label,.step-btn{min-height:33px}}
    @media (orientation:landscape){.app::after{content:"SCHLAGHERZ ist für diese iPad-Fassung im Hochformat gedacht.";position:fixed;inset:0;background:rgba(2,4,2,.82);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;color:#f5fff5;font-size:24px;letter-spacing:.08em;z-index:99}}
</style>

<body>
  <div class="app">
    <header class="nameplate"><div class="name">SCHLAGHERZ</div><div class="subtitle">POETISCHE RHYTHMUSMASCHINE</div></header>
    <section class="panel matrix-panel">
      <div class="matrix-head"><div class="badge">Step Matrix</div><div class="row-controls"><button class="mini-btn active" id="len16Btn">16 Steps</button><button class="mini-btn" id="len32Btn">32 Steps</button><button class="mini-btn" id="pageBtn" style="display:none">Page 1 / 2</button><div class="display transport-display" id="transportDisplay">STOP</div></div></div>
      <div class="matrix-wrap"><div class="step-header" id="stepHeader"></div><div class="tracks" id="tracks"></div></div>
    </section>
    <section class="controls">
      <section class="panel global-panel">
        <div class="panel-header"><div class="badge">Global</div></div>
        <div class="global-body">
          <div class="stack-col">
            <div class="stack-card field-col"><div class="field-row"><div class="small-label left">BPM</div><input id="bpmInput" type="number" min="5" max="500" value="120" /></div><div class="field-row"><div class="small-label left">Beat</div><select id="beatSelect"><option>4/4</option><option>8/4</option><option>3/4</option><option>6/4</option></select></div><button class="toggle" id="metBtn"><span>MET</span></button></div>
            <button class="btn big" id="startStopBtn">Start / Stop</button><button class="btn" id="undoBtn">Undo</button><button class="btn" id="clearAllBtn">Clear All</button><button class="btn" id="globalResetBtn">Global Reset</button><button class="btn" id="saveBtn">Save</button><button class="btn" id="loadBtn">Load</button>
          </div>
          <div class="fader-bank"><div class="fader"><div class="fader-label">VOL</div><input id="masterVol" class="v-range" type="range" min="0" max="1" step="0.01" value="0.8" /></div><div class="fader"><div class="fader-label">RVB</div><input id="reverbAmt" class="v-range" type="range" min="0" max="1" step="0.01" value="0" /></div><div class="fader"><div class="fader-label">DLY</div><input id="delayTime" class="v-range" type="range" min="0" max="1" step="0.01" value="0" /></div><div class="fader"><div class="fader-label">FDB</div><input id="delayFb" class="v-range" type="range" min="0" max="0.92" step="0.01" value="0" /></div></div>
          <div class="action-col"><button class="btn" id="fillBtn">Fill</button><button class="btn" id="variationBtn">Variation</button><button class="btn" id="wavBtn">Loop → WAV</button><button class="toggle" id="syncBtn"><span>Sync</span></button><button class="toggle" id="midiBtn"><span>MIDI</span></button></div>
        </div>
      </section>
      <section class="panel track-panel">
        <div class="panel-header"><div class="badge">Per Track</div><div class="display track-display" id="trackDisplay">TRK I: SMP</div></div>
        <div class="track-body">
          <div class="track-card pan-card"><div class="pan-top"><div class="small-label">L</div><div class="pan-title">PAN</div><div class="small-label">CTR</div><div class="small-label">R</div></div><input id="trackPan" type="range" min="-1" max="1" step="0.01" value="0" /><div id="panDisp">C</div></div>
          <div class="fader-bank track-bank"><div class="fader"><div class="fader-label">VOL</div><input id="trackVol" class="v-range" type="range" min="0" max="1" step="0.01" value="0.8" /></div><div class="fader"><div class="fader-label">TUNE</div><input id="trackTune" class="v-range" type="range" min="-12" max="12" step="1" value="0" /></div><div class="fader"><div class="fader-label">A</div><input id="trackA" class="v-range" type="range" min="0" max="0.2" step="0.001" value="0.001" /></div><div class="fader"><div class="fader-label">D</div><input id="trackD" class="v-range" type="range" min="0.02" max="1.2" step="0.001" value="0.18" /></div><div class="fader"><div class="fader-label">R</div><input id="trackR" class="v-range" type="range" min="0.02" max="1.2" step="0.001" value="0.09" /></div><div class="fader"><div class="fader-label">RVB<br>INT</div><input id="trackRvbInt" class="v-range" type="range" min="0" max="1" step="0.01" value="0" /></div><div class="fader"><div class="fader-label">DLY<br>INT</div><input id="trackDlyInt" class="v-range" type="range" min="0" max="1" step="0.01" value="0" /></div><div class="fader"><div class="fader-label">TMP</div><input id="trackTempo" class="v-range" type="range" min="0.25" max="4" step="0.01" value="1" /><input id="trackTempoNum" type="number" min="0.25" max="4" step="0.01" value="1" /></div></div>
          <div class="track-footer"><div class="track-card start-card"><div class="small-label left">Track Start Offset</div><div class="start-inline"><input id="trackStart" type="range" min="0" max="31" step="1" value="0" /><div class="display" id="trackStartDisp">01</div></div></div><button class="btn big" id="startTrkBtn">Start Trk</button></div>
        </div>
      </section>
    </section>
    <section class="footer-strip panel"><div class="sample-zone"><div class="sample-grid" id="sampleSlots"></div><div class="tiny" id="samplerInfo">Sampler bereit.</div></div><button class="rec-tall" id="recSlotBtn">Rec<br>Smpl<br>Slot</button><div class="perf-grid"><button class="btn" id="soloBtn">Solo</button><button class="btn" id="quantBtn">Quant</button><button class="btn" id="liveRecBtn">Live Rec</button><button class="btn" id="muteBtn">Mute</button><button class="btn" id="triggerBtn">Trigger</button><button class="btn" id="playSlotBtn">Play Slot</button></div></section>
  </div>
<script>
(() => {
  const TRACKS = [
    { code:'I', name:'SMP', type:'smp' },
    { code:'H', name:'PC2', type:'pc2' },
    { code:'G', name:'PC1', type:'pc1' },
    { code:'F', name:'OHH', type:'ohh' },
    { code:'E', name:'CHH', type:'chh' },
    { code:'D', name:'CLP', type:'clp' },
    { code:'C', name:'RIM', type:'rim' },
    { code:'B', name:'SD', type:'sd' },
    { code:'A', name:'BD', type:'bd' }
  ];
  const TOTAL_STEPS = 32;
  const STORAGE_KEY = 'schlagherz-pwa-v3-state';
  const WAV_SAMPLE_RATE = 44100;

  const state = {
    patternLength:16,
    page:0,
    currentTrack:0,
    bpm:120,
    beat:'4/4',
    masterVol:0.8,
    reverbAmt:0,
    delayTime:0,
    delayFb:0,
    met:false,
    sync:false,
    midi:false,
    playing:false,
    undoStack:[],
    playhead:0,
    timer:null,
    nextNoteTime:0,
    renderLock:false,
    sampleRecReady:false,
    sampleRecording:false,
    sampleMonitor:null,
    sampleStream:null,
    sampleChunks:[],
    tracks: TRACKS.map(t => ({
      ...t,
      steps: Array.from({length:TOTAL_STEPS}, ()=> t.type === 'smp' ? 0 : false),
      vol:0.8, pan:0, tune:0,
      a:0.001, d:0.18, r:0.09,
      rvbInt:0, dlyInt:0,
      tempo:1, start:0,
      mute:false, solo:false, quant:true,
      sampleSlot:1,
      sampleBuffers:[null,null,null,null],
      liveActive:false
    }))
  };

  let audioCtx, masterGain, dryGain, globalVerbSend, globalDelaySend, convolver, delayNode, delayFeedback, compressor;
  const noiseCache = new Map();
  let trackRowEls = [];
  let stepEls = [];
  let hasLoadedFromStorage = false;

  function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }

  function snapshotForUndo(){
    state.undoStack.push(deepClone({
      patternLength:state.patternLength,
      page:state.page,
      currentTrack:state.currentTrack,
      bpm:state.bpm,
      beat:state.beat,
      masterVol:state.masterVol,
      reverbAmt:state.reverbAmt,
      delayTime:state.delayTime,
      delayFb:state.delayFb,
      met:state.met,
      sync:state.sync,
      midi:state.midi,
      tracks: state.tracks.map(t => ({
        code:t.code,name:t.name,type:t.type,
        steps:[...t.steps], vol:t.vol, pan:t.pan, tune:t.tune,
        a:t.a,d:t.d,r:t.r, rvbInt:t.rvbInt, dlyInt:t.dlyInt,
        tempo:t.tempo, start:t.start, mute:t.mute, solo:t.solo, quant:t.quant,
        sampleSlot:t.sampleSlot
      }))
    }));
    if(state.undoStack.length > 40) state.undoStack.shift();
  }

  function restoreSnapshot(snap){
    const wasPlaying = state.playing;
    stopTransport();
    state.patternLength = snap.patternLength;
    state.page = snap.page;
    state.currentTrack = snap.currentTrack;
    state.bpm = snap.bpm;
    state.beat = snap.beat;
    state.masterVol = snap.masterVol;
    state.reverbAmt = snap.reverbAmt;
    state.delayTime = snap.delayTime;
    state.delayFb = snap.delayFb;
    state.met = snap.met;
    state.sync = snap.sync;
    state.midi = snap.midi;
    snap.tracks.forEach((src, i) => {
      Object.assign(state.tracks[i], src);
      state.tracks[i].steps = [...src.steps];
    });
    syncUiFromState();
    renderAll();
    saveLocal();
    if(wasPlaying) startTransport();
  }

  function createImpulse(ctx, seconds=1.8, decay=2.2){
    const len = Math.floor(ctx.sampleRate * seconds);
    const buffer = ctx.createBuffer(2, len, ctx.sampleRate);
    for(let ch=0; ch<2; ch++){
      const data = buffer.getChannelData(ch);
      for(let i=0;i<len;i++) data[i] = (Math.random()*2 - 1) * Math.pow(1 - i/len, decay);
    }
    return buffer;
  }

  function ensureAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value = 18;
    compressor.ratio.value = 2.5;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.18;

    masterGain = audioCtx.createGain();
    dryGain = audioCtx.createGain();
    globalVerbSend = audioCtx.createGain();
    globalDelaySend = audioCtx.createGain();
    convolver = audioCtx.createConvolver();
    convolver.buffer = createImpulse(audioCtx);
    delayNode = audioCtx.createDelay(2.0);
    delayFeedback = audioCtx.createGain();

    dryGain.connect(masterGain);
    globalVerbSend.connect(convolver);
    convolver.connect(masterGain);
    globalDelaySend.connect(delayNode);
    delayNode.connect(masterGain);
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);

    masterGain.connect(compressor);
    compressor.connect(audioCtx.destination);

    updateGlobalAudioParams();
  }

  function updateGlobalAudioParams(){
    if(!audioCtx) return;
    masterGain.gain.setTargetAtTime(state.masterVol, audioCtx.currentTime, 0.01);
    delayFeedback.gain.setTargetAtTime(state.delayFb, audioCtx.currentTime, 0.02);
    const dly = state.sync ? (60 / state.bpm) / 2 : (0.05 + state.delayTime * 0.7);
    delayNode.delayTime.setTargetAtTime(dly, audioCtx.currentTime, 0.02);
  }


function createTrackOutput(track){
  const panner = audioCtx.createStereoPanner();
  const gain = audioCtx.createGain();
  panner.pan.value = track.pan;
  gain.gain.value = track.vol;
  gain.connect(panner);
  panner.connect(dryGain);

  if(track.rvbInt > 0 && state.reverbAmt > 0){
    const s = audioCtx.createGain();
    s.gain.value = track.rvbInt * state.reverbAmt * 0.65;
    panner.connect(s);
    s.connect(globalVerbSend);
  }
  if(track.dlyInt > 0 && state.delayTime > 0){
    const s2 = audioCtx.createGain();
    s2.gain.value = track.dlyInt * Math.max(0.15, state.delayTime) * 0.48;
    panner.connect(s2);
    s2.connect(globalDelaySend);
  }
  return gain;
}

function pitchRatio(semitones){
  return Math.pow(2, (semitones || 0) / 12);
}

function noiseBuffer(duration=0.16){
  const key = Math.round(duration * 1000);
  if(noiseCache.has(key)) return noiseCache.get(key);
  const size = Math.max(64, Math.floor(audioCtx.sampleRate * duration));
  const buffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<size;i++) data[i] = Math.random() * 2 - 1;
  noiseCache.set(key, buffer);
  return buffer;
}

function envAt(gainNode, time, peak, attack, decay, release, sustain=0.0001){
  gainNode.gain.cancelScheduledValues(time);
  gainNode.gain.setValueAtTime(0.0001, time);
  gainNode.gain.linearRampToValueAtTime(Math.max(0.001, peak), time + Math.max(0.0005, attack));
  gainNode.gain.exponentialRampToValueAtTime(Math.max(0.0002, sustain), time + Math.max(0.004, attack + decay + release));
}

function synthDrum(type, time, out, track){
  const atk = Math.max(0.0005, track.a || 0.001);
  const dec = Math.max(0.005, track.d || 0.12);
  const rel = Math.max(0.005, track.r || 0.05);
  const ratio = pitchRatio(track.tune);

  if(type === 'bd'){
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150 * ratio, time);
    osc.frequency.exponentialRampToValueAtTime(42 * ratio, time + 0.12 + dec * 0.1);
    envAt(g, time, 1.0, atk, dec + 0.08, rel + 0.08);
    osc.connect(g).connect(out);
    osc.start(time);
    osc.stop(time + atk + dec + rel + 0.2);

    const click = audioCtx.createBufferSource();
    click.buffer = noiseBuffer(0.012);
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1800 * ratio;
    const cg = audioCtx.createGain();
    cg.gain.setValueAtTime(0.22, time);
    cg.gain.exponentialRampToValueAtTime(0.0001, time + 0.012);
    click.connect(hp).connect(cg).connect(out);
    click.start(time);
    click.stop(time + 0.02);
    return;
  }

  if(type === 'sd'){
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer(0.28);
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2200 * ratio;
    bp.Q.value = 0.8;
    const ng = audioCtx.createGain();
    envAt(ng, time, 0.78, atk, dec * 0.92, rel * 0.88);
    noise.connect(bp).connect(ng).connect(out);
    noise.start(time);
    noise.stop(time + atk + dec + rel + 0.08);

    [185, 332].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = i === 0 ? 'triangle' : 'sine';
      osc.frequency.setValueAtTime(f * ratio, time);
      osc.frequency.exponentialRampToValueAtTime(f * 0.72 * ratio, time + 0.085);
      envAt(g, time, i === 0 ? 0.26 : 0.13, atk, dec * 0.58, rel * 0.36);
      osc.connect(g).connect(out);
      osc.start(time);
      osc.stop(time + 0.2 + dec);
    });
    return;
  }

  if(type === 'rim'){
    [470, 720, 1085].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = f * ratio;
      envAt(g, time, 0.16 - i * 0.024, 0.0005, 0.026, 0.02 + rel * 0.25);
      osc.connect(g).connect(out);
      osc.start(time);
      osc.stop(time + 0.06 + rel * 0.2);
    });
    return;
  }

  if(type === 'clp'){
    [0, 0.021, 0.043].forEach((off, i) => {
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer(0.12);
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1750 * ratio;
      bp.Q.value = 1.2;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, time + off);
      g.gain.linearRampToValueAtTime(0.52 - i * 0.12, time + off + 0.001);
      g.gain.exponentialRampToValueAtTime(0.0001, time + off + 0.04 + dec * 0.4);
      noise.connect(bp).connect(g).connect(out);
      noise.start(time + off);
      noise.stop(time + off + 0.09 + dec * 0.45);
    });
    return;
  }

  if(type === 'chh' || type === 'ohh'){
    const dur = type === 'ohh' ? 0.19 + dec + rel : 0.045 + dec * 0.34 + rel * 0.14;
    [2, 3, 4.16, 5.43, 6.79, 8.21].forEach(mult => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 6500;
      osc.type = 'square';
      osc.frequency.value = 220 * mult * ratio;
      g.gain.setValueAtTime(0.0001, time);
      g.gain.linearRampToValueAtTime(0.072, time + 0.001);
      g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
      osc.connect(g).connect(hp).connect(out);
      osc.start(time);
      osc.stop(time + dur + 0.02);
    });
    return;
  }

  if(type === 'pc1' || type === 'pc2'){
    const base = type === 'pc1' ? 370 : 505;
    [1, 1.52, 2.11].forEach((m, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = i === 1 ? 'triangle' : 'sine';
      osc.frequency.setValueAtTime(base * m * ratio, time);
      envAt(g, time, 0.19 - i * 0.03, 0.0008, 0.055 + dec * 0.18, 0.018 + rel * 0.12);
      osc.connect(g).connect(out);
      osc.start(time);
      osc.stop(time + 0.11 + dec * 0.2);
    });
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer(0.05);
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = (type === 'pc1' ? 1450 : 1950) * ratio;
    bp.Q.value = 1.8;
    const ng = audioCtx.createGain();
    envAt(ng, time, type === 'pc1' ? 0.11 : 0.09, 0.0005, 0.018, 0.02);
    noise.connect(bp).connect(ng).connect(out);
    noise.start(time);
    noise.stop(time + 0.06);
    return;
  }
}

function triggerTrack(trackIndex, time = audioCtx.currentTime){

    ensureAudio();
    const track = state.tracks[trackIndex];
    const anySolo = state.tracks.some(t => t.solo);
    if(track.mute) return;
    if(anySolo && !track.solo) return;

  const out = createTrackOutput(track);

  if(track.type === 'smp'){
    const slotIndex = Math.max(0, (track.lastTriggeredSlot || track.sampleSlot) - 1);
    const buf = track.sampleBuffers[slotIndex];
    if(buf){
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.playbackRate.value = pitchRatio(track.tune);
      src.connect(out);
      src.start(time);
    } else {
      const ghost = audioCtx.createBufferSource();
      ghost.buffer = noiseBuffer(0.05);
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1400;
      const gg = audioCtx.createGain();
      envAt(gg, time, 0.18, 0.0005, 0.02, 0.03);
      ghost.connect(bp).connect(gg).connect(out);
      ghost.start(time);
      ghost.stop(time + 0.06);
    }
    return;
  }

  synthDrum(track.type, time, out, track);
}


  function triggerMetronome(time){
    if(!state.met) return;
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = (state.playhead % 4 === 0) ? 1500 : 1100;
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(dryGain);
    shapeEnv(gain, time, 0.001, 0.02, 0.02, 0.14);
    osc.start(time);
    osc.stop(time + 0.05);
  }

  function stepActiveForTrack(track, absoluteStep){
    const len = state.patternLength;
    const normStep = absoluteStep % len;
    const shifted = (normStep - (track.start % len) + len) % len;
    const tempoStep = Math.floor((shifted * track.tempo) % len);
    if(track.type === 'smp') return track.steps[tempoStep] > 0;
    return !!track.steps[tempoStep];
  }

  function triggerAtStep(track, absoluteStep){
    const len = state.patternLength;
    const normStep = absoluteStep % len;
    const shifted = (normStep - (track.start % len) + len) % len;
    const tempoStep = Math.floor((shifted * track.tempo) % len);
    if(track.type === 'smp') track.lastTriggeredSlot = track.steps[tempoStep] || track.sampleSlot;
  }

  function scheduleStep(step, time){
    state.tracks.forEach((track, idx) => {
      if(stepActiveForTrack(track, step)){
        triggerAtStep(track, step);
        triggerTrack(idx, time);
      }
    });
    triggerMetronome(time);
  }

  function renderPlayhead(){
    stepEls.flat().forEach(el => el.classList.remove('playing'));
    const pageStart = state.page * 16;
    const local = (state.playhead % state.patternLength) - pageStart;
    if(local >= 0 && local < 16){
      stepEls.forEach(row => row[local]?.classList.add('playing'));
    }
  }

  function scheduler(){
    if(!state.playing || !audioCtx) return;
    const lookAhead = 0.09;
    const stepDur = 60 / state.bpm / 4;
    while(state.nextNoteTime < audioCtx.currentTime + lookAhead){
      scheduleStep(state.playhead, state.nextNoteTime);
      state.playhead = (state.playhead + 1) % state.patternLength;
      state.nextNoteTime += stepDur;
    }
    renderPlayhead();
  }

  function startTransport(){
    ensureAudio();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    if(state.playing) return;
    state.playing = true;
    state.playhead = state.playhead % state.patternLength;
    state.nextNoteTime = audioCtx.currentTime + 0.05;
    state.timer = setInterval(scheduler, 25);
    document.getElementById('transportDisplay').textContent = 'RUN';
  }

  function stopTransport(){
    state.playing = false;
    if(state.timer){ clearInterval(state.timer); state.timer = null; }
    document.getElementById('transportDisplay').textContent = 'STOP';
    stepEls.flat().forEach(el => el.classList.remove('playing'));
  }

  function saveLocal(){
    const safe = {
      patternLength:state.patternLength,
      page:state.page,
      currentTrack:state.currentTrack,
      bpm:state.bpm,
      beat:state.beat,
      masterVol:state.masterVol,
      reverbAmt:state.reverbAmt,
      delayTime:state.delayTime,
      delayFb:state.delayFb,
      met:state.met,
      sync:state.sync,
      midi:state.midi,
      tracks: state.tracks.map(t => ({
        code:t.code,name:t.name,type:t.type,
        steps:[...t.steps], vol:t.vol, pan:t.pan, tune:t.tune,
        a:t.a,d:t.d,r:t.r, rvbInt:t.rvbInt, dlyInt:t.dlyInt,
        tempo:t.tempo, start:t.start, mute:t.mute, solo:t.solo, quant:t.quant,
        sampleSlot:t.sampleSlot,
        sampleBuffers:(t.sampleBuffers||[]).map(buf => buf ? audioBufferToBase64(buf) : null)
      }))
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(safe));
  }

  function loadLocal(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    try {
      const safe = JSON.parse(raw);
      state.patternLength = safe.patternLength ?? 16;
      state.page = safe.page ?? 0;
      state.currentTrack = safe.currentTrack ?? 0;
      state.bpm = safe.bpm ?? 120;
      state.beat = safe.beat ?? '4/4';
      state.masterVol = safe.masterVol ?? 0.8;
      state.reverbAmt = safe.reverbAmt ?? 0;
      state.delayTime = safe.delayTime ?? 0;
      state.delayFb = safe.delayFb ?? 0;
      state.met = !!safe.met;
      state.sync = !!safe.sync;
      state.midi = !!safe.midi;
      safe.tracks?.forEach((src, i) => {
        const t = state.tracks[i];
        if(!t) return;
        Object.assign(t, src);
        t.steps = Array.isArray(src.steps) ? [...src.steps] : t.steps;
      });
      hasLoadedFromStorage = true;
      return true;
    } catch(err){
      console.warn(err);
      return false;
    }
  }

  function base64ToAudioBuffer(base64){
    if(!base64) return null;
    const obj = JSON.parse(atob(base64));
    const ctx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(obj.channels.length, obj.length, obj.sampleRate);
    obj.channels.forEach((ch, i) => buf.getChannelData(i).set(ch));
    return buf;
  }

  function audioBufferToBase64(buf){
    const obj = {
      sampleRate: buf.sampleRate,
      length: buf.length,
      channels: Array.from({length: buf.numberOfChannels}, (_, i) => Array.from(buf.getChannelData(i)))
    };
    return btoa(JSON.stringify(obj));
  }

  function syncUiFromState(){
    document.getElementById('masterVol').value = state.masterVol;
    document.getElementById('bpmInput').value = state.bpm;
    document.getElementById('beatSelect').value = state.beat;
    document.getElementById('reverbAmt').value = state.reverbAmt;
    document.getElementById('delayTime').value = state.delayTime;
    document.getElementById('delayFb').value = state.delayFb;
    document.getElementById('metBtn').classList.toggle('active', state.met);
    document.getElementById('syncBtn').classList.toggle('active', state.sync);
    document.getElementById('midiBtn').classList.toggle('active', state.midi);
    document.getElementById('len16Btn').classList.toggle('active', state.patternLength === 16);
    document.getElementById('len32Btn').classList.toggle('active', state.patternLength === 32);
    const pageBtn = document.getElementById('pageBtn');
    pageBtn.style.display = state.patternLength === 32 ? '' : 'none';
    pageBtn.textContent = state.page === 0 ? 'Page 1 / 2' : 'Page 2 / 2';

    const t = state.tracks[state.currentTrack];
    document.getElementById('trackDisplay').textContent = `TRK ${t.code}: ${t.name}`;
    document.getElementById('trackVol').value = t.vol;
    document.getElementById('trackPan').value = t.pan;
    document.getElementById('trackA').value = t.a;
    document.getElementById('trackD').value = t.d;
    document.getElementById('trackR').value = t.r;
    document.getElementById('trackTune').value = t.tune;
    document.getElementById('trackRvbInt').value = t.rvbInt;
    document.getElementById('trackDlyInt').value = t.dlyInt;
    document.getElementById('trackTempo').value = t.tempo;
    document.getElementById('trackTempoNum').value = t.tempo;
    document.getElementById('trackStart').value = t.start;
    document.getElementById('trackStartDisp').textContent = String(t.start + 1).padStart(2,'0');
    document.getElementById('panDisp').textContent = t.pan < -0.1 ? 'L' : t.pan > 0.1 ? 'R' : 'C';
    document.getElementById('muteBtn').classList.toggle('active', t.mute);
    document.getElementById('soloBtn').classList.toggle('active', t.solo);
    document.getElementById('quantBtn').classList.toggle('active', t.quant);
  }

  function buildStepHeader(){
    const header = document.getElementById('stepHeader');
    header.innerHTML = '';
    const label = document.createElement('div');
    label.className = 'step-label';
    label.textContent = 'TRACK';
    header.appendChild(label);
    const pageStart = state.page * 16;
    for(let i=0;i<16;i++){
      const n = pageStart + i + 1;
      const cell = document.createElement('div');
      cell.className = 'step-head' + (((i+1) % 4 === 0 && i < 15) ? ' block-end' : '');
      cell.textContent = String(n).padStart(2,'0');
      header.appendChild(cell);
    }
  }

  function buildTracks(){
    const wrap = document.getElementById('tracks');
    wrap.innerHTML = '';
    trackRowEls = [];
    stepEls = [];
    state.tracks.forEach((track, ti) => {
      const row = document.createElement('div');
      row.className = 'track-row';
      const tl = document.createElement('button');
      tl.className = 'track-label' + (state.currentTrack === ti ? ' selected' : '');
      tl.textContent = `TRK ${track.code}: ${track.name}`;
      tl.addEventListener('pointerdown', e => {
        e.preventDefault();
        state.currentTrack = ti;
        syncUiFromState();
        renderTracks();
      });
      row.appendChild(tl);
      trackRowEls.push(tl);

      const rowSteps = [];
      const pageStart = state.page * 16;
      for(let i=0;i<16;i++){
        const absoluteStep = pageStart + i;
        const b = document.createElement('button');
        b.className = 'step-btn' + (((i+1)%4===0 && i<15) ? ' block-end' : '');
        b.dataset.track = ti;
        b.dataset.step = absoluteStep;
        b.addEventListener('pointerdown', handleStepTouch, {passive:false});
        row.appendChild(b);
        rowSteps.push(b);
      }
      stepEls.push(rowSteps);
      wrap.appendChild(row);
    });
  }

  function renderTracks(){
    const pageStart = state.page * 16;
    state.tracks.forEach((track, ti) => {
      trackRowEls[ti]?.classList.toggle('selected', state.currentTrack === ti);
      for(let i=0;i<16;i++){
        const absStep = pageStart + i;
        const btn = stepEls[ti][i];
        let on = false;
        let text = '';
        if(track.type === 'smp'){
          on = track.steps[absStep] > 0;
          text = on ? String(track.steps[absStep]) : '';
        } else {
          on = !!track.steps[absStep];
        }
        btn.classList.toggle('on', on);
        btn.textContent = text;
      }
    });
    renderPlayhead();
  }

  function renderSampleSlots(){
    const wrap = document.getElementById('sampleSlots');
    wrap.innerHTML = '';
    const st = state.tracks.find(t => t.type === 'smp');
    for(let i=1;i<=4;i++){
      const b = document.createElement('button');
      b.className = 'slot-btn' + (st.sampleSlot === i ? ' active' : '');
      b.textContent = `Slot ${i}`;
      b.addEventListener('pointerdown', e => {
        e.preventDefault();
        st.sampleSlot = i;
        renderSampleSlots();
        saveLocal();
      });
      wrap.appendChild(b);
    }
  }

  function renderAll(){
    if(state.renderLock) return;
    state.renderLock = true;
    try{
      syncUiFromState();
      buildStepHeader();
      buildTracks();
      renderTracks();
      renderSampleSlots();
      updateGlobalAudioParams();
    } finally {
      state.renderLock = false;
    }
  }

  function handleStepTouch(e){
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    const trackIndex = +e.currentTarget.dataset.track;
    const stepIndex = +e.currentTarget.dataset.step;
    const track = state.tracks[trackIndex];
    state.currentTrack = trackIndex;
    snapshotForUndo();
    if(track.type === 'smp'){
      track.steps[stepIndex] = track.steps[stepIndex] === track.sampleSlot ? 0 : track.sampleSlot;
    } else {
      track.steps[stepIndex] = !track.steps[stepIndex];
    }
    syncUiFromState();
    renderTracks();
    saveLocal();
  }

  function setPatternLength(len){
    snapshotForUndo();
    state.patternLength = len;
    if(len === 16) state.page = 0;
    state.playhead = state.playhead % len;
    renderAll();
    saveLocal();
  }

  function fillPattern(){
    snapshotForUndo();
    const sn = state.tracks.find(t => t.type === 'sd');
    const ch = state.tracks.find(t => t.type === 'chh');
    const len = state.patternLength;
    for(let i=0;i<len;i+=4){
      const pos = (i + (Math.random() < 0.5 ? 2 : 3)) % len;
      sn.steps[pos] = true;
      if(Math.random() < 0.45) ch.steps[(pos + 1) % len] = true;
    }
    renderTracks();
    saveLocal();
  }

  function varyPattern(){
    snapshotForUndo();
    const len = state.patternLength;
    state.tracks.forEach(track => {
      const idx = Math.floor(Math.random() * len);
      if(track.type === 'smp') track.steps[idx] = track.steps[idx] ? 0 : track.sampleSlot;
      else track.steps[idx] = !track.steps[idx];
    });
    renderTracks();
    saveLocal();
  }

  function clearAll(){
    snapshotForUndo();
    state.tracks.forEach(track => {
      track.steps = Array.from({length:TOTAL_STEPS}, () => track.type === 'smp' ? 0 : false);
    });
    renderTracks();
    saveLocal();
  }

  function resetEverything(){
    localStorage.removeItem(STORAGE_KEY);
    stopTransport();
    location.reload();
  }

  function saveWavLoop(){
    const len = state.patternLength;
    const totalSeconds = (60 / state.bpm / 4) * len;
    const totalFrames = Math.ceil(totalSeconds * WAV_SAMPLE_RATE);
    const left = new Float32Array(totalFrames);
    const right = new Float32Array(totalFrames);
    const renderTrack = track => {
      const panL = Math.sqrt((1 - track.pan) / 2);
      const panR = Math.sqrt((1 + track.pan) / 2);
      for(let s=0;s<len;s++){
        const active = track.type === 'smp' ? track.steps[s] > 0 : !!track.steps[s];
        if(!active) continue;
        const startFrame = Math.floor((s * (60 / state.bpm / 4)) * WAV_SAMPLE_RATE);
        const dur = Math.min(totalFrames - startFrame, Math.floor((0.08 + track.d * 0.25 + track.r * 0.2) * WAV_SAMPLE_RATE));
        for(let i=0;i<dur;i++){
          const env = Math.exp(-i / Math.max(120, dur / 3));
          const x = (Math.random() * 2 - 1) * env * track.vol * 0.18;
          left[startFrame + i] += x * panL;
          right[startFrame + i] += x * panR;
        }
      }
    };
    state.tracks.forEach(renderTrack);
    const wav = encodeWavStereo(left, right, WAV_SAMPLE_RATE);
    const url = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}));
    const a = document.createElement('a');
    a.href = url;
    a.download = 'schlagherz-loop.wav';
    a.click();
    URL.revokeObjectURL(url);
  }

  function encodeWavStereo(left, right, sampleRate){
    const length = left.length;
    const interleaved = new Int16Array(length * 2);
    for(let i=0;i<length;i++){
      interleaved[i*2] = Math.max(-1, Math.min(1, left[i])) * 32767;
      interleaved[i*2+1] = Math.max(-1, Math.min(1, right[i])) * 32767;
    }
    const buffer = new ArrayBuffer(44 + interleaved.byteLength);
    const view = new DataView(buffer);
    const write = (offset, str) => { for(let i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i)); };
    write(0, 'RIFF');
    view.setUint32(4, 36 + interleaved.byteLength, true);
    write(8, 'WAVE');
    write(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 2, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 4, true);
    view.setUint16(32, 4, true);
    view.setUint16(34, 16, true);
    write(36, 'data');
    view.setUint32(40, interleaved.byteLength, true);
    new Int16Array(buffer, 44).set(interleaved);
    return buffer;
  }

  async function ensureSampleStream(){
    if(state.sampleStream) return state.sampleStream;
    state.sampleStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    return state.sampleStream;
  }

  async function armSampleRecording(){
    try{
      await ensureSampleStream();
      state.sampleRecReady = true;
      document.getElementById('samplerInfo').textContent = 'Sampler bereit. Nochmals REC SLOT drücken zum Aufnehmen.';
      document.getElementById('recSlotBtn').classList.add('active');
    } catch(err){
      document.getElementById('samplerInfo').textContent = 'Mikrofonzugriff fehlgeschlagen.';
      console.warn(err);
    }
  }

  async function startSampleRecording(){
    const smp = state.tracks.find(t => t.type === 'smp');
    try{
      const stream = await ensureSampleStream();
      const rec = new MediaRecorder(stream);
      state.sampleRecording = true;
      state.sampleChunks = [];
      document.getElementById('samplerInfo').textContent = 'Aufnahme läuft …';
      document.getElementById('recSlotBtn').classList.add('active');
      rec.ondataavailable = ev => { if(ev.data.size) state.sampleChunks.push(ev.data); };
      rec.onstop = async () => {
        state.sampleRecording = false;
        const blob = new Blob(state.sampleChunks, {type: rec.mimeType || 'audio/webm'});
        const arr = await blob.arrayBuffer();
        ensureAudio();
        const decoded = await audioCtx.decodeAudioData(arr.slice(0));
        const clipped = trimAudioBuffer(decoded, 0.4);
        smp.sampleBuffers[smp.sampleSlot - 1] = clipped;
        document.getElementById('samplerInfo').textContent = `Sample in Slot ${smp.sampleSlot} gespeichert.`;
        document.getElementById('recSlotBtn').classList.remove('active');
        saveLocal();
      };
      rec.start();
      setTimeout(() => { try { rec.stop(); } catch(_){} }, 1400);
    } catch(err){
      state.sampleRecording = false;
      document.getElementById('samplerInfo').textContent = 'Sample-Aufnahme fehlgeschlagen.';
      document.getElementById('recSlotBtn').classList.remove('active');
      console.warn(err);
    }
  }

  function trimAudioBuffer(buffer, seconds=0.4){
    const length = Math.min(buffer.length, Math.floor(buffer.sampleRate * seconds));
    const out = audioCtx.createBuffer(buffer.numberOfChannels, length, buffer.sampleRate);
    for(let ch=0; ch<buffer.numberOfChannels; ch++){
      out.getChannelData(ch).set(buffer.getChannelData(ch).slice(0, length));
    }
    return out;
  }

  function bindEvents(){
    document.body.addEventListener('pointerdown', () => {
      ensureAudio();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      if(hasLoadedFromStorage){
        state.tracks.forEach(track => {
          if(track.type === 'smp' && track.sampleBuffers?.some(Boolean)){
            track.sampleBuffers = track.sampleBuffers.map(buf => typeof buf === 'string' ? base64ToAudioBuffer(buf) : buf);
          }
        });
        hasLoadedFromStorage = false;
      }
    }, {once:true});

    document.getElementById('startStopBtn').addEventListener('pointerdown', e => {
      e.preventDefault();
      state.playing ? stopTransport() : startTransport();
    });
    document.getElementById('len16Btn').addEventListener('pointerdown', e => { e.preventDefault(); setPatternLength(16); });
    document.getElementById('len32Btn').addEventListener('pointerdown', e => { e.preventDefault(); setPatternLength(32); });
    document.getElementById('pageBtn').addEventListener('pointerdown', e => { e.preventDefault(); if(state.patternLength===32){ state.page = state.page ? 0 : 1; renderAll(); } });
    document.getElementById('masterVol').addEventListener('input', e => { state.masterVol = +e.target.value; updateGlobalAudioParams(); saveLocal(); });
    document.getElementById('bpmInput').addEventListener('change', e => { state.bpm = Math.max(5, Math.min(500, +e.target.value || 120)); updateGlobalAudioParams(); saveLocal(); });
    document.getElementById('beatSelect').addEventListener('change', e => { state.beat = e.target.value; saveLocal(); });
    document.getElementById('reverbAmt').addEventListener('input', e => { state.reverbAmt = +e.target.value; updateGlobalAudioParams(); saveLocal(); });
    document.getElementById('delayTime').addEventListener('input', e => { state.delayTime = +e.target.value; updateGlobalAudioParams(); saveLocal(); });
    document.getElementById('delayFb').addEventListener('input', e => { state.delayFb = +e.target.value; updateGlobalAudioParams(); saveLocal(); });
    document.getElementById('metBtn').addEventListener('pointerdown', e => { e.preventDefault(); state.met = !state.met; syncUiFromState(); saveLocal(); });
    document.getElementById('syncBtn').addEventListener('pointerdown', e => { e.preventDefault(); state.sync = !state.sync; syncUiFromState(); updateGlobalAudioParams(); saveLocal(); });
    document.getElementById('midiBtn').addEventListener('pointerdown', e => { e.preventDefault(); state.midi = !state.midi; syncUiFromState(); saveLocal(); });
    document.getElementById('clearAllBtn').addEventListener('pointerdown', e => { e.preventDefault(); clearAll(); });
    document.getElementById('globalResetBtn').addEventListener('pointerdown', e => { e.preventDefault(); resetEverything(); });
    document.getElementById('fillBtn').addEventListener('pointerdown', e => { e.preventDefault(); fillPattern(); });
    document.getElementById('variationBtn').addEventListener('pointerdown', e => { e.preventDefault(); varyPattern(); });
    document.getElementById('saveBtn').addEventListener('pointerdown', e => { e.preventDefault(); saveLocal(); document.getElementById('transportDisplay').textContent = 'SAVED'; setTimeout(()=>{ if(!state.playing) document.getElementById('transportDisplay').textContent='STOP'; else document.getElementById('transportDisplay').textContent='RUN'; }, 600); });
    document.getElementById('loadBtn').addEventListener('pointerdown', e => {
      e.preventDefault();
      const ok = loadLocal();
      if(ok){
        syncUiFromState();
        renderAll();
        document.getElementById('transportDisplay').textContent = 'LOADED';
        setTimeout(()=>{ if(!state.playing) document.getElementById('transportDisplay').textContent='STOP'; else document.getElementById('transportDisplay').textContent='RUN'; }, 600);
      } else {
        alert('Kein Speicherstand gefunden.');
      }
    });
    document.getElementById('undoBtn').addEventListener('pointerdown', e => {
      e.preventDefault();
      const snap = state.undoStack.pop();
      if(snap) restoreSnapshot(snap);
    });
    document.getElementById('wavBtn').addEventListener('pointerdown', e => { e.preventDefault(); saveWavLoop(); });

    const bindTrack = (id, prop, parser = v => +v) => {
      document.getElementById(id).addEventListener('input', e => {
        state.tracks[state.currentTrack][prop] = parser(e.target.value);
        if(id === 'trackPan') document.getElementById('panDisp').textContent = state.tracks[state.currentTrack].pan < -0.1 ? 'L' : state.tracks[state.currentTrack].pan > 0.1 ? 'R' : 'C';
        if(id === 'trackStart') document.getElementById('trackStartDisp').textContent = String(state.tracks[state.currentTrack].start + 1).padStart(2,'0');
        if(id === 'trackTempo') document.getElementById('trackTempoNum').value = state.tracks[state.currentTrack].tempo;
        saveLocal();
      });
    };
    bindTrack('trackVol','vol');
    bindTrack('trackPan','pan');
    bindTrack('trackA','a');
    bindTrack('trackD','d');
    bindTrack('trackR','r');
    bindTrack('trackTune','tune', v => +v);
    bindTrack('trackRvbInt','rvbInt');
    bindTrack('trackDlyInt','dlyInt');
    bindTrack('trackTempo','tempo');
    bindTrack('trackStart','start', v => +v);
    document.getElementById('trackTempoNum').addEventListener('change', e => {
      const v = Math.max(0.25, Math.min(4, +e.target.value || 1));
      state.tracks[state.currentTrack].tempo = v;
      document.getElementById('trackTempo').value = v;
      saveLocal();
    });

    document.getElementById('muteBtn').addEventListener('pointerdown', e => { e.preventDefault(); const t=state.tracks[state.currentTrack]; t.mute=!t.mute; syncUiFromState(); saveLocal(); });
    document.getElementById('soloBtn').addEventListener('pointerdown', e => { e.preventDefault(); const t=state.tracks[state.currentTrack]; t.solo=!t.solo; syncUiFromState(); saveLocal(); });
    document.getElementById('quantBtn').addEventListener('pointerdown', e => { e.preventDefault(); const t=state.tracks[state.currentTrack]; t.quant=!t.quant; syncUiFromState(); saveLocal(); });
    document.getElementById('triggerBtn').addEventListener('pointerdown', e => { e.preventDefault(); ensureAudio(); triggerTrack(state.currentTrack); });
    document.getElementById('startTrkBtn').addEventListener('pointerdown', e => { e.preventDefault(); state.tracks[state.currentTrack].start = state.playhead % state.patternLength; syncUiFromState(); saveLocal(); });
    document.getElementById('liveRecBtn').addEventListener('pointerdown', e => { e.preventDefault(); alert('LIVE REC für Parameter-Automation folgt in einer späteren Fassung.'); });
    document.getElementById('playSlotBtn').addEventListener('pointerdown', e => {
      e.preventDefault();
      const smp = state.tracks.find(t => t.type === 'smp');
      smp.lastTriggeredSlot = smp.sampleSlot;
      triggerTrack(0);
    });
    document.getElementById('recSlotBtn').addEventListener('pointerdown', async e => {
      e.preventDefault();
      if(!state.sampleRecReady){
        await armSampleRecording();
      } else if(!state.sampleRecording){
        await startSampleRecording();
        state.sampleRecReady = false;
      }
    });
  }

  async function registerSW(){
    if('serviceWorker' in navigator){
      try{ await navigator.serviceWorker.register('./service-worker.js?v=3'); } catch(err){ console.warn(err); }
    }
  }

  loadLocal();
  bindEvents();
  renderAll();
  registerSW();
})();
</script>
</body>
</html>
